<nav class="navbar navbar-expand-sm navbar-dark bg-dark fixed-top shadow-sm">
    <div class="navbar-decorations">
        <!-- 动态星星装饰 -->
        <div class="navbar-star" style="left: 10%; animation-delay: 0s;"></div>
        <div class="navbar-star" style="left: 30%; animation-delay: 1s;"></div>
        <div class="navbar-star" style="left: 50%; animation-delay: 2s;"></div>
        <div class="navbar-star" style="left: 70%; animation-delay: 3s;"></div>
        <div class="navbar-star" style="left: 90%; animation-delay: 4s;"></div>
        
        <!-- 闪烁光点 -->
        <div class="navbar-sparkle" style="left: 20%; top: 30%; animation-delay: 0.5s;"></div>
        <div class="navbar-sparkle" style="left: 40%; top: 60%; animation-delay: 1.5s;"></div>
        <div class="navbar-sparkle" style="left: 60%; top: 40%; animation-delay: 2.5s;"></div>
        <div class="navbar-sparkle" style="left: 80%; top: 70%; animation-delay: 3.5s;"></div>
    </div>
    
    <div class="{% if page.container_class %}{{ page.container_class }}{% else %}container-lg{% endif %}">
        <a class="navbar-brand"><strong>{{site.data.profile.navbar_name}}</strong></a>
        <button class="navbar-toggler" style="font-size: 1em; padding: 0.5em;" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
            <i class="fas fa-map"></i> Menu
        </button>

        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ml-auto">
                {% for item in site.data.navigation.pages %}
                <li class="nav-item {% if item.name == page.navbar_title %}active{% endif %}">
                    <a class="nav-link" href="{{ item.url | relative_url }}">{{ item.name }}</a>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</nav>
